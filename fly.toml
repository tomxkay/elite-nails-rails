# fly.toml app configuration file generated for elite-nails-rails on 2025-12-04T20:05:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elite-nails-rails'
primary_region = 'iad'
console_command = '/rails/bin/rails console'

[build]

[env]
  # Thruster listens on HTTP_PORT (must be >1024 — the container runs as a
  # non-root user, so binding its default :80 fails) and runs Puma internally
  # on its own target port. Fly's internal_port below must match.
  HTTP_PORT = '8080'
  # Public-site canonical domain; www/fly.dev redirect here (machine
  # endpoints like /mcp exempt — see lib/middleware/canonical_host.rb).
  CANONICAL_HOST = 'elitenailscramerton.com'
  # DATABASE_URL is provided as a Fly secret via `fly postgres attach` (not stored here).

[processes]
  app = './bin/thrust ./bin/rails server'

# DB migrations run on boot via bin/docker-entrypoint (`rails db:prepare`).
# Postgres is an external Fly Postgres cluster — no persistent volume needed.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
