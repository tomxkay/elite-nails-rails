# PostgreSQL across all environments.
#
# Production uses the multi-database Solid layout (primary + cache/queue/cable),
# each a separate database on the same Postgres server (names derived by appending
# _cache/_queue/_cable to the DATABASE_URL path). DATABASE_URL is provided by Fly
# (`fly postgres attach`). First deploy must be able to create those databases —
# see docs/cms-ai-roadmap.md for the deploy steps.
#
postgres_default: &postgres_default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *postgres_default
  database: elite_nails_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *postgres_default
  database: elite_nails_test

production:
  primary:
    <<: *postgres_default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *postgres_default
    migrations_paths: db/cache_migrate
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |url| url.path += "_cache" } if ENV["DATABASE_URL"] %>
  queue:
    <<: *postgres_default
    migrations_paths: db/queue_migrate
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |url| url.path += "_queue" } if ENV["DATABASE_URL"] %>
  cable:
    <<: *postgres_default
    migrations_paths: db/cable_migrate
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |url| url.path += "_cable" } if ENV["DATABASE_URL"] %>
